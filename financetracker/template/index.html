<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal finance tracker......</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <script>
        function daily() {
            window.location.href="{% url 'daily' %}";
            
        }
        function monthly() {
            window.location.href="{% url 'monthly'%}";
            
        }
        function logout(){
            window.location.href ="{% url 'login' %}"
        }

    </script>
    
        {% csrf_token %}

        
        <h1>personal finance tracker</h1>
        
        <nav>
            
            <h1>  hello !{{gmail}} </h1>
        </nav>
        
        
        <div class="message-container-left">
            <div class="message-card">
            <h4>50-30-20 Rule</h4>
            <p>50% Needs, 30% Wants, 20% Savings</p>
            </div>
            <div class="message-card">
                <h4>Tip</h4>
                <p>Always track daily expenses.</p>
            </div>
        </div>
        <div class="message-container-right">
            <div class="message-card">
                <h4>Reminder</h4>
                <p>Check monthly savings progress.</p>
            </div>
        </div>
    
        
        <div class="daily">
            <button  type="submit"  class="card-btn daily-btn"   onclick="daily()">daily bases rocord</button>
        </div>
        <div class="monthly">
            <button type="submit" class="card-btn monthly-btn"    onclick="monthly()" >monthly bases rocord</button>
        </div>
        <div id="logout">
            <button type="button"  class=" card-btn logout-btn"      onclick="logout()">logout</button>
        </div>

    
    
    

    
    
</body>
</html>
